<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>.


    <title>Active Ports</title>
  </head>

  <body class="bg-gray-200 p-2">
    <div class="flex border-2 border-cyan-500 h-screen">
      <!-- SIDEBAR -->
      <aside class="w-24 bg-indigo-900 p-3">
        <a
          href="home.html"
          class="bg-cyan-400 text-black text-xs px-3 py-3 inline-block hover:bg-cyan-300 transition"
        >
          Go back
        </a>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 bg-gray-300">
        <!-- HEADER -->
        <header
          class="bg-cyan-500 h-10 flex items-center justify-center border-b-2 border-dashed border-white"
        >
          <h1 class="font-bold">Active ports page</h1>
        </header>

        <!-- CENTER -->
        <section class="h-[90%] flex justify-center items-center">
          <!-- COMPONENT -->
          <div class="bg-white border p-4 text-center">
            <h2 class="text-xs mb-2">Active ports</h2>

            <div class="grid grid-cols-3 gap-2">
              <div class="bg-red-500 text-white text-xs p-2">1</div>
              <div class="bg-green-500 text-white text-xs p-2">2</div>
              <div class="bg-red-500 text-white text-xs p-2">3</div>

              <div class="bg-green-500 text-white text-xs p-2">6</div>
              <div class="bg-green-500 text-white text-xs p-2">5</div>
              <div class="bg-green-500 text-white text-xs p-2">4</div>
            </div>

            <div class="flex justify-center gap-4 mt-3 text-[10px]">
              <div class="flex items-center gap-1">
                <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                inactive
              </div>

              <div class="flex items-center gap-1">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                active
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
