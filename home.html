<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>.


    <title>Network Dashboard</title>
  </head>

  <body class="bg-gray-200 min-h-screen p-6">
    <!-- Main Container -->
    <div class="flex border-2 border-cyan-500 min-h-[650px]">
      <!-- SIDEBAR -->
      <aside class="w-32 bg-indigo-900 flex flex-col items-center pt-36 gap-6">
        <!-- Button Component -->
        <a
          href="mobile-home.html"
          class="bg-cyan-400 text-black text-xs px-5 py-3 w-20 text-center hover:bg-cyan-300 transition duration-300"
        >
          Mobile
        </a>

        <a
          href="activeports.html"
          class="bg-cyan-400 text-black text-xs px-3 py-3 w-20 text-center hover:bg-cyan-300 transition duration-300"
        >
          Active ports
        </a>

        <a
          href="mac.html"
          class="bg-cyan-400 text-black text-xs px-3 py-3 w-20 text-center hover:bg-cyan-300 transition duration-300"
        >
          MAC table
        </a>

        <a
          href="traffic.html"
          class="bg-cyan-400 text-black text-xs px-3 py-3 w-20 text-center hover:bg-cyan-300 transition duration-300"
        >
          Port traffic
        </a>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 bg-gray-300">
        <!-- TOP HEADER -->
        <header
          class="bg-cyan-500 h-10 flex items-center justify-center border-b-2 border-dashed border-white"
        >
          <h1 class="font-bold text-black text-xl">Homepage</h1>
        </header>

        <!-- CENTER CONTENT -->
        <section class="flex justify-center items-center h-[550px]">
          <div class="max-w-sm text-left space-y-10">
            <h2 class="text-4xl font-bold">Welcome to the HOMEPAGE!</h2>

            <p class="text-4xl font-bold leading-tight">
              Choose how to proceed by pressing the buttons on the left.
            </p>

            <p class="text-4xl font-bold leading-tight">
              You will then be redirected to a page with the network details you
              request.
            </p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
