<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>.


    <title>Port Traffic</title>
  </head>

  <body class="bg-gray-200 p-2">
    <div class="flex border-2 border-cyan-500 h-screen">
      <!-- SIDEBAR -->
      <aside class="w-24 bg-indigo-900 p-3">
        <a
          href="home.html"
          class="bg-cyan-400 text-black text-xs px-3 py-3 inline-block hover:bg-cyan-300 transition"
        >
          Go back
        </a>
      </aside>

      <!-- MAIN -->
      <main class="flex-1 bg-gray-300">
        <!-- HEADER -->
        <header class="bg-cyan-500 h-10 flex items-center justify-center">
          <h1 class="font-bold">Port traffic page</h1>
        </header>

        <!-- CONTENT -->
        <section class="h-[90%] flex justify-center items-center">
          <div class="grid grid-cols-2 gap-2">
            <div class="bg-white p-3 text-xs border">
              <p>Port traffic</p>
              <p>Port 1</p>
              <p>11 mbps</p>
            </div>

            <div class="bg-white p-3 text-xs border">
              <p>Port traffic</p>
              <p>Port 2</p>
              <p>22 mbps</p>
            </div>

            <div class="bg-white p-3 text-xs border">
              <p>Port traffic</p>
              <p>Port 4</p>
              <p>13 mbps</p>
            </div>

            <div class="bg-white p-3 text-xs border">
              <p>Port traffic</p>
              <p>Port 5</p>
              <p>12 mbps</p>
            </div>

            <div class="bg-white p-3 text-xs border">
              <p>Port traffic</p>
              <p>Port 6</p>
              <p>14 mbps</p>
            </div>

            <div class="bg-white p-3 text-xs border">
              <p>Port traffic</p>
              <p>Port 7</p>
              <p>16 mbps</p>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
