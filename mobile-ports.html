<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Mobile Active Ports</title>
</head>

<body class="bg-gray-200 p-2 min-h-screen">

<div class="border-2 border-cyan-500 bg-gray-300 min-h-screen">

<!-- HEADER -->
<header class="bg-cyan-500 py-3 text-center">

    <h1 class="font-bold text-lg">
    Active ports page
    </h1>

</header>

<!-- TOP NAV -->
<nav class="bg-indigo-900 p-4 flex justify-center">

    <a href="mobile-home.html"
    class="bg-cyan-400 text-black text-xs px-4 py-2 hover:bg-cyan-300 transition">
    Go back
    </a>

</nav>

<!-- CONTENT -->
<main class="flex justify-center items-center py-24">

    <div class="bg-white border p-4 text-center">

    <h2 class="text-sm mb-3">
        Active ports
    </h2>

    <div class="grid grid-cols-3 gap-2">

        <div class="bg-red-500 text-white text-xs p-3">1</div>
        <div class="bg-green-500 text-white text-xs p-3">2</div>
        <div class="bg-red-500 text-white text-xs p-3">3</div>

        <div class="bg-green-500 text-white text-xs p-3">6</div>
        <div class="bg-green-500 text-white text-xs p-3">5</div>
        <div class="bg-green-500 text-white text-xs p-3">4</div>

    </div>

    <div class="flex justify-center gap-4 mt-4 text-[10px]">

        <div class="flex items-center gap-1">
        <div class="w-2 h-2 bg-red-500 rounded-full"></div>
        inactive
        </div>

        <div class="flex items-center gap-1">
        <div class="w-2 h-2 bg-green-500 rounded-full"></div>
        active
        </div>

    </div>

    </div>

</main>

</div>

</body>
</html>
