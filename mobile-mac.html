<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Mobile MAC Table</title>
</head>

<body class="bg-gray-200 p-2 min-h-screen">

<div class="border-2 border-cyan-500 bg-gray-300 min-h-screen">

<!-- HEADER -->
<header class="bg-cyan-500 py-3 text-center">

    <h1 class="font-bold text-lg">
    MAC table page
    </h1>

</header>

<!-- NAV -->
<nav class="bg-indigo-900 p-4 flex justify-center">

    <a href="mobile-home.html"
    class="bg-cyan-400 text-black text-xs px-4 py-2 hover:bg-cyan-300 transition">
    Go back
    </a>

</nav>

<!-- CONTENT -->
<main class="flex justify-center py-20 px-2 overflow-x-auto">

    <table class="bg-white border text-xs">

    <tr>
        <th class="border px-2 py-2">Port</th>
        <th class="border px-2 py-2">MAC Address</th>
        <th class="border px-2 py-2">Status</th>
    </tr>

    <tr>
        <td class="border px-2 py-2">1</td>
        <td class="border px-2 py-2">AA:BB:CC:DD:EE</td>
        <td class="border px-2 py-2">Active</td>
    </tr>

    <tr>
        <td class="border px-2 py-2">2</td>
        <td class="border px-2 py-2">BB:AA:CC:DD:EE</td>
        <td class="border px-2 py-2">Active</td>
    </tr>

    </table>

</main>

</div>

</body>
</html>
